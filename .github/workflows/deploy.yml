name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    uses: "getpelican/pelican/.github/workflows/github_pages.yml@86f1f7225d99dd269dbd6d58ed0aae45867045c7"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    with:
      settings: "pelicanconf.py"
      requirements: "-r requirements/dev.txt"
      theme: "https://github.com/seanh/sidecar.git"
