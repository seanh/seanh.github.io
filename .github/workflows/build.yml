name: Build
on:
  workflow_call:
    inputs:
      site_repo:
        description: "The site repo to checkout."
        required: true
        type: string
      site_ref:
        description: "The site repo branch, tag, or SHA to checkout."
        required: true
        type: string
      theme_repo:
        description: "The theme repo to checkout."
        required: true
        type: string
      theme_ref:
        description: "The theme repo branch, tag, or SHA to checkout."
        required: true
        type: string
      base_url:
        description: "The base URL that the site will be deployed to. Examples: 'https://octocat.github.io/my-repo', 'https://octocat.github.io', 'https://www.example.com'."
        required: true
        type: string
      artifact_name:
        description: "The name of the GitHub Actions artifact to upload the built site to, if any."
        required: false
        type: string
    secrets:
      site_repo_token:
        description: "The GitHub token to use when checking out site_repo"
        required: true
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.site_repo }}
          ref: ${{ inputs.site_ref }}
          token: ${{ secrets.site_repo_token }}
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.theme_repo }}
          ref: ${{ inputs.theme_ref }}
          path: ".theme"
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: 0.10.7
      - run: uv sync --locked
      - run: |
          uv run pelican \
          --settings pelicanconf.py \
          --extra-settings \
          SITEURL='"${{ inputs.base_url }}"' \
          FEED_DOMAIN='"${{ inputs.base_url }}"' \
          --theme-path .theme
      - run: |
          echo "::group::Archive artifact"
          tar \
            --dereference \
            --hard-dereference \
            --directory output \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          echo "::endgroup::"
        if: ${{ inputs.artifact_name }}
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true
        if: ${{ inputs.artifact_name }}
